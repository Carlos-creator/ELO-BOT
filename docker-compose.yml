version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongo_rag_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: rag_user
      MONGO_INITDB_ROOT_PASSWORD: rag_password_2026
    ports:
      - "27017:27017"
    volumes:
      - mongo_rag_data:/data/db
    restart: unless-stopped

volumes:
  mongo_rag_data: